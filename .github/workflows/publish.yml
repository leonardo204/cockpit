name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.COCKPIT_NPM_TOKEN }}

      # Create the GitHub Release with an EMPTY body. The
      # `cockpit-release` skill's Step 6 fills it in with hand-authored
      # notes via `gh release edit --notes-file`. We deliberately do
      # NOT use `--generate-notes` — its output appends a
      # `**Full Changelog**: .../compare/...` tail that violates the
      # project's hand-written-only release-notes convention. Empty
      # body forces the human-in-the-loop step instead of leaving
      # "good enough" auto-text on opencockpit.dev/changelog.
      - name: Create GitHub Release (empty body — filled by cockpit-release skill)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --notes ""
